name: Daily Scraper

on:
  schedule:
    - cron: "0 6,12,18,0 * * *"  # 4× daily: 06:00, 12:00, 18:00, 00:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/main.py

      - name: Run KarpTube scraper
        run: python scraper/karptube_scraper.py

      - name: Commit updated pending.js
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add palantir-dashboard/pending.js scraper/seen_ids.json palantir-dashboard/karptube.js scraper/karptube_seen_ids.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: scraper update $(date -u +%Y-%m-%d)" && git push
